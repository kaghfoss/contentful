<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contentful Editor Docs</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#f9fafb;color:#1f2937}
  .layout{display:flex;height:100vh;overflow:hidden}
  aside{width:220px;background:#fff;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
  .sidebar-header{padding:16px;border-bottom:1px solid #f3f4f6}
  .sidebar-label{font-size:11px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
  .tab-row{display:flex;gap:4px}
  .tab-btn{flex:1;font-size:11px;padding:4px 2px;border-radius:4px;border:none;cursor:pointer;font-weight:500;transition:all .15s}
  .tab-btn.active{background:#2563eb;color:#fff}
  .tab-btn.inactive{background:#f3f4f6;color:#6b7280}
  .tab-btn.inactive:hover{background:#e5e7eb}
  nav{flex:1;padding:8px 0}
  .nav-btn{width:100%;text-align:left;padding:10px 16px;border:none;background:none;cursor:pointer;font-size:13px;transition:background .1s;border-right:2px solid transparent}
  .nav-btn.active{background:#eff6ff;color:#1d4ed8;font-weight:600;border-right-color:#2563eb}
  .nav-btn.inactive{color:#6b7280}
  .nav-btn.inactive:hover{background:#f9fafb}
  .nav-code{font-size:11px;font-family:monospace;color:#9ca3af;display:block;margin-bottom:1px}
  main{flex:1;overflow-y:auto}
  .content{max-width:740px;margin:0 auto;padding:32px 24px}
  h1{font-size:22px;font-weight:700;color:#111827;margin-bottom:8px}
  h2{font-size:15px;font-weight:700;color:#111827;margin-bottom:12px}
  .desc{color:#6b7280;line-height:1.6;margin-bottom:24px}
  .badge{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:2px 8px;border-radius:12px;margin-right:6px;margin-bottom:4px}
  .badge-code{background:#f3f4f6;color:#6b7280}
  .badge-singleton{background:#fef3c7;color:#92400e}
  .badge-required{background:#fee2e2;color:#b91c1c}
  .badge-localized{background:#e0f2fe;color:#0369a1}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
  .card{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:12px}
  .card-label{font-size:11px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
  .card-mono{font-family:monospace;font-size:12px;color:#374151}
  .card-note{font-size:12px;color:#6b7280;margin-top:4px}
  .required-box{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:12px 16px;margin-bottom:24px}
  .required-box-label{font-size:11px;font-weight:600;color:#b91c1c;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
  .required-tags{display:flex;flex-wrap:wrap;gap:6px}
  .required-tag{font-size:11px;background:#fff;border:1px solid #fecaca;color:#b91c1c;padding:2px 8px;border-radius:4px;font-family:monospace}
  .section-label{font-size:11px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;padding:0 4px}
  .field-group{margin-bottom:16px}
  .fields-list{background:#fff;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden}
  .field-row{padding:12px 16px;border-bottom:1px solid #f3f4f6;cursor:pointer}
  .field-row:last-child{border-bottom:none}
  .field-row:hover{background:#fafafa}
  .field-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .field-name{font-weight:500;color:#111827}
  .field-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
  .field-id{font-size:11px;font-family:monospace;color:#9ca3af;margin-top:2px}
  .field-note{margin-top:8px;font-size:12px;color:#6b7280;background:#f9fafb;border-radius:4px;padding:8px 12px;line-height:1.5}
  .show-guidance{font-size:11px;color:#2563eb;background:none;border:none;cursor:pointer;padding:0;margin-top:4px}
  .show-guidance:hover{text-decoration:underline}
  .type-badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:12px}
  .t-short{background:#dbeafe;color:#1e40af}
  .t-long{background:#ede9fe;color:#5b21b6}
  .t-rich{background:#e0e7ff;color:#3730a3}
  .t-bool{background:#fef9c3;color:#713f12}
  .t-date{background:#ffedd5;color:#9a3412}
  .t-int{background:#ccfbf1;color:#134e4a}
  .t-ref{background:#dcfce7;color:#14532d}
  .t-other{background:#f3f4f6;color:#374151}
  .toggle{font-size:11px;color:#9ca3af}
  .modules-intro{font-size:12px;color:#6b7280;margin-bottom:12px}
  .mod-card{border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;margin-bottom:8px}
  .mod-header{width:100%;display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#fff;border:none;cursor:pointer;text-align:left;transition:background .1s}
  .mod-header:hover{background:#f9fafb}
  .mod-header-left{display:flex;align-items:center;gap:8px}
  .mod-code{font-size:11px;font-family:monospace;color:#9ca3af;width:36px;flex-shrink:0}
  .mod-name{font-weight:500;color:#111827;font-size:13px}
  .mod-body{border-top:1px solid #f3f4f6;background:#f9fafb;padding:12px 16px}
  .mod-desc{font-size:12px;color:#6b7280;margin-bottom:12px;line-height:1.5}
  .no-modules{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:12px 16px;font-size:13px;color:#6b7280}
  .concept-icon{font-size:28px;margin-bottom:12px}
  .concept-body p{color:#374151;line-height:1.7;margin-bottom:16px}
  .concept-body p:last-child{margin-bottom:0}
  .other-topics{border-top:1px solid #e5e7eb;padding-top:24px;margin-top:32px}
  .other-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
  .other-btn{text-align:left;background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .15s;font-size:13px;font-weight:500;color:#374151}
  .other-btn:hover{border-color:#93c5fd;background:#eff6ff}
  .used-on{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
  .used-btn{font-size:12px;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;padding:4px 10px;border-radius:4px;cursor:pointer;font-weight:500}
  .used-btn:hover{background:#dbeafe}
  .divider{margin-bottom:24px}
  a{color:#2563eb}a:hover{text-decoration:underline}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState} = React;

const MODULES = {
  M010HeroModule:{code:"M010",name:"Hero Module",description:"Full-width hero section with headline, media (image or video), and an optional call to action. Typically placed at the top of a page.",fields:[{name:"Internal Name",id:"internalName",type:"Short text",localized:false,required:false,note:"Used only inside Contentful. Not shown on the website."},{name:"Headline",id:"headline",type:"Short text",localized:true,required:true,note:"Required. Main hero heading."},{name:"Eyebrow Headline",id:"eyebrowHeadline",type:"Short text",localized:true,required:false,note:"Small label displayed above the main headline."},{name:"Media",id:"media",type:"Reference → image or video",localized:true,required:true,note:"Required. The hero background — link to an image or video entry."},{name:"Add Fade to Media",id:"mediaFade",type:"Boolean",localized:false,required:false,note:"Adds a gradient fade over the media. Default: true."},{name:"Call to Action",id:"callToAction",type:"Reference → link",localized:true,required:false,note:"Optional CTA button."},{name:"Meta Section ID",id:"meta__sectionId",type:"Short text",localized:false,required:false,note:"Unique ID used for anchor linking to this section. Must be unique across the page."},{name:"Meta Section Name",id:"meta__sectionName",type:"Short text",localized:true,required:false,note:"Label shown in sub-navigation if this section is referenced."}]},
  M020CategoriesModule:{code:"M020",name:"Categories Module",description:"Displays a set of category tiles. Requires at least one category item.",fields:[{name:"Internal Name",id:"internalName",type:"Short text",localized:false,required:false,note:""},{name:"Headline",id:"headline",type:"Short text",localized:true,required:false,note:"Optional heading above the category tiles."},{name:"Categories",id:"categories",type:"References (array) → categoryItem",localized:false,required:true,note:"Required. At least 1 category item required."}]},
  M032PopularProductsCarouselModule:{code:"M032",name:"Popular Products Carousel",description:"Automatically displays popular products from Commercetools. Products are fetched dynamically — editors do not manually select them. Optionally filter by category.",fields:[{name:"Internal Name",id:"internalName",type:"Short text",localized:false,required:false,note:""},{name:"Headline",id:"headline",type:"Long text",localized:true,required:false,note:"Optional heading above the carousel."},{name:"Category",id:"category",type:"Short text",localized:false,required:false,note:"Optional Commercetools category key to filter which products are shown."}]},
  M033SelectedProductsCarouselModule:{code:"M033",name:"Selected Products Carousel",description:"Displays a manually curated list of products from Commercetools. Product IDs are entered as text — the products themselves are managed in Commercetools, not Contentful.",fields:[{name:"Internal Name",id:"internalName",type:"Short text",localized:false,required:false,note:""},{name:"Headline",id:"headline",type:"Short text",localized:true,required:false,note:""},{name:"Products",id:"products",type:"Short text (array)",localized:false,required:true,note:"Required. Enter Commercetools product IDs. Product content is managed in Commercetools."},{name:"All Products Link",id:"allProductsLink",type:"Reference → link",localized:false,required:false,note:"Optional link to the full product catalogue."},{name:"Meta Section ID",id:"meta__sectionId",type:"Short text",localized:false,required:false,note:""},{name:"Meta Section Name",id:"meta__sectionName",type:"Short text",localized:true,required:false,note:""}]},
  M040IntroductionModule:{code:"M040",name:"Introduction Module",description:"A simple title, subtitle, and optional links section. Useful as a page intro or section divider.",fields:[{name:"Internal Name",id:"internalName",type:"Short text",localized:false,required:false,note:""},{name:"Title",id:"title",type:"Long text",localized:true,required:true,note:"Required. Main heading for this section."},{name:"Subtitle",id:"subtitle",type:"Long text",localized:false,required:false,note:"Not localized — same text across all locales."},{name:"Links",id:"links",type:"References (array) → link",localized:true,required:false,note:"Optional CTA links displayed below the text."},{name:"Meta Section ID",id:"meta__sectionId",type:"Short text",localized:false,required:false,note:"Unique ID for anchor linking."},{name:"Meta Section Name",id:"meta__sectionName",type:"Short text",localized:true,required:false,note:""}]},
  M050EndToEndModule:{code:"M050",name:"End to End Module",description:"Displays an industry process flow — a sequence of stages each associated with products. Used on industry pages to showcase product discovery journeys.",fields:[{name:"Internal Name",id:"internalName",type:"Short text",localized:false,required:false,note:""},{name:"Headline",id:"headline",type:"Short text",localized:true,required:true,note:"Required."},{name:"Link",id:"link",type:"Reference → link",localized:false,required:true,note:"Required. A CTA link associated with the module."},{name:"Items",id:"items",type:"References (array) → endToEndStageItem",localized:false,required:true,note:"Required. At least 1 stage item. Each item represents a step in the process flow."},{name:"Meta Section ID",id:"meta__sectionId",type:"Short text",localized:false,required:false,note:""},{name:"Meta Section Name",id:"meta__sectionName",type:"Short text",localized:true,required:false,note:""}]},
  M070ImageModule:{code:"M070",name:"Image Module",description:"A standalone full-width image with an optional caption.",fields:[{name:"Internal Name",id:"internalName",type:"Short text",localized:false,required:false,note:""},{name:"Image",id:"image",type:"Reference → image",localized:false,required:true,note:"Required."},{name:"Caption",id:"caption",type:"Long text",localized:true,required:false,note:"Optional caption displayed below the image."}]},
  M071VideoModule:{code:"M071",name:"Video Module",description:"Embeds a video with a thumbnail image. The video URL and a thumbnail are both required.",fields:[{name:"Internal Name",id:"internalName",type:"Short text",localized:false,required:false,note:""},{name:"Title",id:"title",type:"Short text",localized:true,required:true,note:"Required. Accessible title for the video."},{name:"Video URL",id:"videoUrl",type:"Short text",localized:false,required:true,note:"Required. Full URL to the video (e.g. YouTube or Vimeo)."},{name:"Thumbnail",id:"thumbnail",type:"Reference → image",localized:false,required:true,note:"Required. Shown before the video plays."}]},
  M072GalleryModule:{code:"M072",name:"Gallery Module",description:"Displays a single image or a carousel of multiple images. Use Object Fit and Width to control appearance.",fields:[{name:"Internal Name",id:"internalName",type:"Short text",localized:false,required:false,note:""},{name:"Items",id:"items",type:"References (array) → galleryItem",localized:false,required:true,note:"Required. At least 1 gallery item."},{name:"Object Fit",id:"objectFit",type:"Short text (enum)",localized:false,required:false,note:"Controls how images fill their container. Allowed values: contain, cover."},{name:"Width",id:"width",type:"Short text (enum)",localized:false,required:false,note:"Controls the gallery width. Allowed values: default, wide."},{name:"Meta Section ID",id:"meta__sectionId",type:"Short text",localized:false,required:false,note:""},{name:"Meta Section Name",id:"meta__sectionName",type:"Short text",localized:true,required:false,note:""}]},
  M075ImageAndTextModule:{code:"M075",name:"Image and Text Module",description:"Side-by-side image and text layout. The alignment (image left or right) is configurable. Supports multiple headlines, body text, content points, and a CTA.",fields:[{name:"Internal Name",id:"internalName",type:"Short text",localized:false,required:false,note:""},{name:"Tag",id:"tag",type:"Short text",localized:true,required:false,note:"Small label above the headline."},{name:"Headlines",id:"headlines",type:"Short text (array)",localized:true,required:false,note:"One or more headlines displayed in sequence."},{name:"Content",id:"content",type:"Long text",localized:true,required:false,note:"Body text for this section."},{name:"Content Points",id:"contentPoints",type:"References (array) → contentPoint",localized:false,required:false,note:"Optional bullet-style content points."},{name:"Image",id:"image",type:"Reference → image",localized:false,required:true,note:"Required."},{name:"Call to Action",id:"callToAction",type:"Reference → link",localized:false,required:false,note:"Optional CTA button."},{name:"Content Media Alignment",id:"contentMediaAlignment",type:"Short text (enum)",localized:false,required:true,note:"Required. Allowed values: 'Content | Media' (text left, image right) or 'Media | Content' (image left, text right). Default: Content | Media."},{name:"Meta Section ID",id:"meta__sectionId",type:"Short text",localized:false,required:false,note:""},{name:"Meta Section Name",id:"meta__sectionName",type:"Short text",localized:true,required:false,note:""}]},
  M076BusinessCaseModule:{code:"M076",name:"Business Case Module",description:"Highlights a business case or customer story with an image, headline, description, content points, and a required CTA. Description is capped at 512 characters.",fields:[{name:"Internal Name",id:"internalName",type:"Short text",localized:false,required:false,note:""},{name:"Image",id:"image",type:"Reference → image",localized:false,required:true,note:"Required."},{name:"Tag",id:"tag",type:"Short text",localized:true,required:false,note:"Small label above the headline."},{name:"Headline",id:"headline",type:"Short text",localized:true,required:true,note:"Required."},{name:"Description",id:"description",type:"Long text",localized:true,required:false,note:"Max 512 characters."},{name:"Content Points",id:"contentPoints",type:"References (array) → contentPoint",localized:false,required:false,note:"Optional supporting bullet points."},{name:"Call to Action",id:"callToAction",type:"Reference → link",localized:false,required:true,note:"Required."}]},
  M080ContentCarouselModule:{code:"M080",name:"Content Carousel Module",description:"A carousel of manually curated content cards. Requires at least one content carousel item.",fields:[{name:"Internal Name",id:"internalName",type:"Short text",localized:false,required:false,note:""},{name:"Headline",id:"headline",type:"Short text",localized:true,required:false,note:""},{name:"All Content Link",id:"allContentLink",type:"Reference → link",localized:false,required:false,note:"Optional link to a full content listing page."},{name:"Items",id:"items",type:"References (array) → contentCarouselItem",localized:false,required:true,note:"Required. At least 1 item."},{name:"Meta Section ID",id:"meta__sectionId",type:"Short text",localized:false,required:false,note:""},{name:"Meta Section Name",id:"meta__sectionName",type:"Short text",localized:true,required:false,note:""}]},
  M090ContentSliderModule:{code:"M090",name:"Content Slider Module",description:"A sliding layout alternating between content and media. Layout direction is configurable.",fields:[{name:"Internal Name",id:"internalName",type:"Short text",localized:false,required:false,note:"Must be unique."},{name:"Items",id:"items",type:"References (array) → contentSliderItem",localized:false,required:true,note:"Required."},{name:"Content Media Alignment",id:"contentMediaAlignment",type:"Short text (enum)",localized:false,required:true,note:"Required. Allowed values: 'Content | Media' or 'Media | Content'. Default: Content | Media."},{name:"Meta Section ID",id:"meta__sectionId",type:"Short text",localized:false,required:false,note:""},{name:"Meta Section Name",id:"meta__sectionName",type:"Short text",localized:true,required:false,note:""}]},
  M100RichTextModule:{code:"M100",name:"Rich Text Module",description:"A free-form rich text area. Supports headings (H2–H4), bold, italic, ordered and unordered lists, and hyperlinks. No other formatting is allowed.",fields:[{name:"Internal Name",id:"internalName",type:"Short text",localized:false,required:false,note:""},{name:"Rich Text",id:"richText",type:"Rich text",localized:true,required:true,note:"Required. Allowed marks: bold, italic. Allowed nodes: H2, H3, H4, hyperlink, unordered list, ordered list."},{name:"Meta Section ID",id:"meta__sectionId",type:"Short text",localized:false,required:false,note:""},{name:"Meta Section Name",id:"meta__sectionName",type:"Short text",localized:true,required:false,note:""}]},
  M110SubMenuModule:{code:"M110",name:"SubMenu Module",description:"Renders an in-page sub-navigation bar. No content fields — the menu is automatically built from other modules on the page that have a Meta Section ID set.",fields:[{name:"Internal Name",id:"internalName",type:"Short text",localized:false,required:false,note:"Used to identify this entry in Contentful. The sub-menu is generated automatically from modules with a Meta Section ID."}]},
  M120AccordionModule:{code:"M120",name:"Accordion Module",description:"An expandable accordion of items. Requires at least one accordion item.",fields:[{name:"Internal Name",id:"internalName",type:"Short text",localized:false,required:false,note:""},{name:"Headline",id:"headline",type:"Short text",localized:false,required:false,note:"Not localized."},{name:"Items",id:"items",type:"References (array) → accordionItem",localized:false,required:true,note:"Required. At least 1 accordion item."},{name:"Meta Section ID",id:"meta__sectionId",type:"Short text",localized:false,required:false,note:""},{name:"Meta Section Name",id:"meta__sectionName",type:"Short text",localized:true,required:false,note:""}]},
  M130StatsModule:{code:"M130",name:"Stats Module",description:"Displays 1–3 key statistics. Each stat is a separate stat item entry.",fields:[{name:"Internal Name",id:"internalName",type:"Short text",localized:false,required:false,note:""},{name:"Stats",id:"stats",type:"References (array) → statItem",localized:false,required:true,note:"Required. Between 1 and 3 stat items."},{name:"Meta Section ID",id:"meta__sectionId",type:"Short text",localized:false,required:false,note:""},{name:"Meta Section Name",id:"meta__sectionName",type:"Short text",localized:true,required:false,note:""}]},
  M140UspModule:{code:"M140",name:"USP Module",description:"Displays unique selling points as a row of icons and text. Accepts 1–6 USP items.",fields:[{name:"Internal Name",id:"internalName",type:"Short text",localized:false,required:false,note:""},{name:"USPs",id:"usps",type:"References (array) → uspItem",localized:false,required:true,note:"Required. Between 1 and 6 USP items."},{name:"Meta Section ID",id:"meta__sectionId",type:"Short text",localized:false,required:false,note:""},{name:"Meta Section Name",id:"meta__sectionName",type:"Short text",localized:true,required:false,note:""}]},
  M150LinkCardModule:{code:"M150",name:"Link Card Module",description:"A grid of 1–6 link cards. Each card is a link card item with an image, label, and URL.",fields:[{name:"Internal Name",id:"internalName",type:"Short text",localized:false,required:false,note:""},{name:"Link Cards",id:"linkCards",type:"References (array) → linkCardItem",localized:false,required:true,note:"Required. Between 1 and 6 link card items."}]},
  M160ContactModule:{code:"M160",name:"Contact Module",description:"A contact call-to-action section with a title, optional image, optional logos, and a required CTA link.",fields:[{name:"Internal Name",id:"internalName",type:"Short text",localized:false,required:false,note:""},{name:"Title",id:"title",type:"Short text",localized:true,required:true,note:"Required."},{name:"Image",id:"image",type:"Reference → image",localized:false,required:false,note:"Optional image, e.g. a portrait or illustration."},{name:"Logos",id:"logos",type:"References (array) → image",localized:false,required:false,note:"Optional partner or certification logos."},{name:"Call to Action",id:"callToAction",type:"Reference → link",localized:false,required:true,note:"Required."},{name:"Meta Section ID",id:"meta__sectionId",type:"Short text",localized:false,required:false,note:""},{name:"Meta Section Name",id:"meta__sectionName",type:"Short text",localized:true,required:false,note:""}]},
  M170ProductDetailsModule:{code:"M170",name:"Product Details Module",description:"Displays the product detail section on a Product Detail Page. Product data comes from Commercetools. Editors can add a downloads description and attach downloadable files here.",fields:[{name:"Internal Name",id:"internalName",type:"Short text",localized:false,required:false,note:""},{name:"Downloads Description",id:"downloadsDescription",type:"Long text",localized:true,required:false,note:"Optional text introducing the downloadable files section."},{name:"Files",id:"files",type:"Assets (array)",localized:false,required:false,note:"Downloadable files: PDF, spreadsheet, presentation, plain text, or archive formats."},{name:"Meta Section ID",id:"meta__sectionId",type:"Short text",localized:false,required:false,note:""},{name:"Meta Section Name",id:"meta__sectionName",type:"Short text",localized:true,required:false,note:""}]},

const CONCEPTS = [
  {id:"headless",icon:"🧩",title:"What is a headless CMS?",body:`Contentful is a headless CMS — which means it stores and manages your content separately from the website itself. Think of Contentful as the place where content lives, and the website as the place where it's displayed.\n\nWhen you save and publish content in Contentful, it becomes available to the website through an API. The website fetches that content and renders it using its own design and templates. This means the same content can power the website, a mobile app, or any other channel without you doing anything differently.\n\nIn practice this means: what you see in Contentful's editor is not a direct preview of the final page. Fields, modules, and references are the building blocks — the website assembles them into the finished result. Once Live Preview is activated, you'll be able to open a rendered version of the page directly from Contentful to see how your changes will look.\n\nOur Contentful space: day-to-day editing happens in the Master environment. This is the space connected to the live website. We also have a Test environment used for staging and review, and a Dev environment used by the development team. Not all users have access to all environments. Always double-check that you are working in Master before making changes — the environment name is shown in the URL and in the space switcher. You can access Master directly here: @@LINK:https://app.contentful.com/spaces/ujf2pk72dghn/environments/master/:Open Master space@@\n\nTo go deeper: Contentful's own Content Manager learning path is a great resource for building confidence with the platform, understanding best practices, and getting the most out of the tools available to you. You can find it at @@LINK:https://training.contentful.com/learning-paths/content-manager:Content Manager learning path@@`},
  {id:"statuses",icon:"🟢",title:"Entry statuses & publishing",body:`Every entry in Contentful has a status that controls whether it is visible on the website.\n\nDraft means the entry has been created but not yet published. It exists in Contentful but is not visible on the live website. Use Draft when you're working on content that isn't ready yet.\n\nChanged means the entry was previously published, but you've made edits since. The live website still shows the old version until you publish again.\n\nPublished means the current version of the entry is live on the website. The green Published badge in the top-right panel of the editor confirms this.\n\nPublishing options: when an entry has unsaved changes, the main button reads "Publish changes". Clicking the arrow next to it reveals additional options. "Publish with References" publishes the entry and all the entries it links to in one go — useful when you've made changes across a page and its modules and want to push everything live at once. "Unpublish" takes the entry off the live website without deleting it. "Archive" removes it from the active content list while keeping it in Contentful for reference. "Set Schedule" lets you pick a future date and time for the entry to go live automatically — useful for planned campaigns or announcements.\n\nIf any required fields are missing, Contentful will warn you before publishing and the publish button will be disabled until they are filled in.`},
  {id:"references",icon:"🔗",title:"References & reusability",body:`References are how entries connect to each other in Contentful. Rather than copying content into every place it's needed, you link to a shared entry. This keeps content consistent and reduces duplication.\n\nFor example, a Hero Module references an image entry and optionally a link entry. The image entry stores the actual image file and its alt text. If you update the image entry, every module that references it will reflect the change automatically.\n\nYou'll see references throughout the editor as linked cards. You can click into a referenced entry to edit it directly, or use the three-dot menu to swap it for a different entry.\n\nThe power of reusability: a single link entry like "Let's talk" can be referenced by dozens of modules across the site. A shared image or a set of content points can be used on multiple pages simultaneously. This means a single update propagates everywhere at once — a significant time-saver for global changes like a new CTA URL or updated brand imagery.\n\nEdit with care: reusability also means you need to think before editing an existing entry. If you change the text of a shared link or the image in a widely-used module, that change will appear everywhere that entry is referenced — not just on the page you're currently working on.\n\nBefore editing a referenced entry, always check the Links section in the right-hand sidebar. It shows every entry that links to the one you're editing. If the list is long, or includes pages you weren't expecting, consider whether you should edit the existing entry or create a new one for your specific use case.\n\nThe References tab at the top of any entry shows a full map of what it links to and what links to it — useful for understanding the full impact of a change before making it.\n\nPublishing note: if a referenced entry is in Draft or has unpublished changes, those changes won't appear on the website until that entry is also published. Use "Publish with References" to push an entry and all its linked entries live in one step.`},
  {id:"locales",icon:"🌍",title:"Locales",body:`Locales allow the same content to exist in multiple languages within a single entry. Instead of duplicating entries for each market, localized fields have a separate value per language.\n\nYou'll see the locale label (e.g. "English") next to any localized field in the editor. The Active locales panel on the right side of the editor shows which locales are currently active for that entry.\n\nHow editing works for your team:\n\n— The global marketing team owns and edits English (en), which is the default locale. English content is used as the fallback if a locale-specific translation is missing.\n\n— Local marketing teams can edit their own locale only. You can view the English version of any field for reference, but you cannot change it.\n\n— Non-localized fields (those without a language label) are shared across all locales. Changing them affects every market simultaneously — take care when editing these.\n\nWhen you switch locale in the editor, localized fields will show the content for that language. If a field hasn't been translated yet, it may appear empty or fall back to the English value on the website.`},
  {id:"livepreview",icon:"👁️",title:"Live Preview",body:`Live Preview lets you see how your content will look on the actual website before publishing. It opens a rendered version of the page in your browser, updated in real time as you make changes in the editor.\n\nLive Preview is not yet activated for this project, but it will be set up shortly. Once active, you'll find the "Open Live Preview" button in the right-hand panel of any page entry.\n\nUntil Live Preview is available, the best way to check your work is to publish to a staging environment and review the page there before publishing to production. Ask your global marketing team lead for staging access if you don't have it yet.\n\nNote: Live Preview shows content from Contentful's preview API, which includes Draft and Changed entries — so you can review unpublished changes before they go live.`},
  {id:"internalname",icon:"🏷️",title:"The Internal Name field",body:`Every content type has an Internal Name field at the top of the editor. This is purely for your team's use inside Contentful — it never appears on the website.\n\nA good internal name makes entries easy to find when browsing content or searching in Contentful. It should be descriptive enough that anyone on the team can understand what the entry is without opening it.\n\nSome suggested conventions to discuss with your team when establishing your governance model:\n\n— For page entries: use the page title as it appears on the site, e.g. "Home Page – EN" or "Dairy Industry Page – DK".\n— For modules: include the page name and module type, e.g. "Home – Hero" or "Dairy – Introduction Module".\n— For shared entries like links or images: use a descriptive name that reflects the content, not where it's used, so it remains reusable.\n\nConsistent naming makes content much easier to manage as the volume of entries grows.`},
];

const PG = {label:"Content",ids:["internalName","headline","eyebrowHeadline","description","introduction","image","credit","creditType","publicationDate","postsPerPage","header","noResultText","facets","modules","breadcrumbTitle","parentPage","slug","updatedAt"]};
const PG2 = {label:"SEO & Meta",ids:["meta__title","meta__description","meta__hideFromRobots","meta__hideFromRrobots","hideFromRobots","meta__canonical","metaTitle","metaDescription"]};
const PG3 = {label:"Social Sharing",ids:["openGraph__title","openGraph__description","openGraph__image"]};
function groupFields(fields){return [PG,PG2,PG3].map(g=>({label:g.label,fields:fields.filter(f=>g.ids.includes(f.id))})).filter(g=>g.fields.length>0);}

const SINGLETONS=new Set(["P010SearchPage","P071IndustryListPage","P081BlogListPage","P140NotFoundPage","P150ErrorPage"]);

function typeClass(t){
  if(t.startsWith("Reference")||t.startsWith("Assets"))return "t-ref";
  if(t==="Short text"||t==="Short text (array)"||t==="Short text (enum)")return "t-short";
  if(t==="Long text")return "t-long";
  if(t==="Rich text")return "t-rich";
  if(t==="Boolean")return "t-bool";
  if(t==="Date")return "t-date";
  if(t==="Integer")return "t-int";
  return "t-other";
}

function renderBody(text){
  return text.split("\n\n").map((para,i)=>{
    const parts = para.split(/(@@LINK:[^@]+@@)/g);
    return <p key={i}>{parts.map((part,j)=>{
      const m = part.match(/^@@LINK:([^:]+):([^@]+)@@$/);
      if(m) return <a key={j} href={m[1]} target="_blank" rel="noopener noreferrer">{m[2]}</a>;
      return part;
    })}</p>;
  });
}

function FieldRow({field}){
  const [open,setOpen]=useState(false);
  return(
    <div className="field-row" onClick={()=>field.note&&setOpen(o=>!o)}>
      <div className="field-top">
        <div>
          <span className="field-name">{field.name}</span>
          {field.required&&<span className="badge badge-required" style={{marginLeft:6}}>Required</span>}
          {field.localized&&<span className="badge badge-localized" style={{marginLeft:4}}>Localized</span>}
        </div>
        <div className="field-right">
          <span className={`type-badge ${typeClass(field.type)}`}>{field.type}</span>
          {field.note&&<span className="toggle">{open?"▲":"▼"}</span>}
        </div>
      </div>
      <div className="field-id">{field.id}</div>
      {field.note&&!open&&<button className="show-guidance" onClick={e=>{e.stopPropagation();setOpen(true);}}>Show guidance</button>}
      {field.note&&open&&<div className="field-note">{field.note}</div>}
    </div>
  );
}

function ModCard({moduleId}){
  const mod=MODULES[moduleId];
  const [open,setOpen]=useState(false);
  if(!mod)return null;
  return(
    <div className="mod-card">
      <button className="mod-header" onClick={()=>setOpen(o=>!o)}>
        <div className="mod-header-left">
          <span className="mod-code">{mod.code}</span>
          <span className="mod-name">{mod.name}</span>
        </div>
        <span className="toggle">{open?"▲":"▼"}</span>
      </button>
      {open&&<div className="mod-body">
        <div className="mod-desc">{mod.description}</div>
        <div className="fields-list">{mod.fields.map(f=><FieldRow key={f.id} field={f}/>)}</div>
      </div>}
    </div>
  );
}

function App(){
  const [view,setView]=useState("concepts");
  const [selPage,setSelPage]=useState(PAGES[0].id);
  const [selMod,setSelMod]=useState(Object.keys(MODULES)[0]);
  const [selConcept,setSelConcept]=useState(CONCEPTS[0].id);

  const page=PAGES.find(p=>p.id===selPage);
  const mod=MODULES[selMod];
  const concept=CONCEPTS.find(c=>c.id===selConcept);
  const grouped=groupFields(page.fields);

  return(
    <div className="layout">
      <aside>
        <div className="sidebar-header">
          <div className="sidebar-label">Contentful Docs</div>
          <div className="tab-row">
            {[["concepts","Basics"],["pages","Pages"],["modules","Modules"]].map(([id,label])=>(
              <button key={id} className={`tab-btn ${view===id?"active":"inactive"}`} onClick={()=>setView(id)}>{label}</button>
            ))}
          </div>
        </div>
        <nav>
          {view==="concepts"&&CONCEPTS.map(c=>(
            <button key={c.id} className={`nav-btn ${selConcept===c.id?"active":"inactive"}`} onClick={()=>setSelConcept(c.id)}>
              <span style={{marginRight:6}}>{c.icon}</span>{c.title}
            </button>
          ))}
          {view==="pages"&&PAGES.map(p=>(
            <button key={p.id} className={`nav-btn ${selPage===p.id?"active":"inactive"}`} onClick={()=>setSelPage(p.id)}>
              <span className="nav-code">{p.code}</span>{p.name}
            </button>
          ))}
          {view==="modules"&&Object.entries(MODULES).map(([id,m])=>(
            <button key={id} className={`nav-btn ${selMod===id?"active":"inactive"}`} onClick={()=>setSelMod(id)}>
              <span className="nav-code">{m.code}</span>{m.name}
            </button>
          ))}
        </nav>
      </aside>

      <main>
        <div className="content">

          {view==="concepts"&&concept&&<>
            <div className="concept-icon">{concept.icon}</div>
            <h1>{concept.title}</h1>
            <div className="concept-body" style={{marginTop:16}}>{renderBody(concept.body)}</div>
            <div className="other-topics">
              <div className="sidebar-label">Other topics</div>
              <div className="other-grid">
                {CONCEPTS.filter(c=>c.id!==concept.id).map(c=>(
                  <button key={c.id} className="other-btn" onClick={()=>setSelConcept(c.id)}>
                    <span style={{marginRight:6}}>{c.icon}</span>{c.title}
                  </button>
                ))}
              </div>
            </div>
          </>}

          {view==="pages"&&<>
            <div style={{marginBottom:6,display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
              <span className="badge badge-code">{page.code}</span>
              {SINGLETONS.has(page.id)&&<span className="badge badge-singleton">Singleton — one entry only</span>}
            </div>
            <h1>{page.name}</h1>
            <p className="desc" style={{marginTop:8}}>{page.description}</p>
            <div className="grid2">
              <div className="card"><div className="card-label">Slug</div><div className="card-mono">{page.slug.value}</div>{page.slug.note&&<div className="card-note">{page.slug.note}</div>}</div>
              <div className="card"><div className="card-label">Parent Page</div><div className="card-note" style={{marginTop:0}}>{page.parentPage??"None — this is the root page"}</div></div>
            </div>
            {page.requiredFields.length>0&&<div className="required-box">
              <div className="required-box-label">Required fields</div>
              <div className="required-tags">{page.requiredFields.map(f=>{const field=page.fields.find(ff=>ff.id===f);return<span key={f} className="required-tag">{field?.name??f}</span>;})}</div>
            </div>}
            <div className="divider">
              <h2>Fields</h2>
              {grouped.map(g=><div key={g.label} className="field-group">
                <div className="section-label">{g.label}</div>
                <div className="fields-list">{g.fields.map(f=><FieldRow key={f.id} field={f}/>)}</div>
              </div>)}
            </div>
            {page.moduleIds.length>0?<>
              <h2>Allowed Modules</h2>
              <p className="modules-intro">Click a module to see its fields.</p>
              {page.moduleIds.map(id=><ModCard key={id} moduleId={id}/>)}
            </>:<div className="no-modules">This page type does not use modules.</div>}
          </>}

          {view==="modules"&&mod&&<>
            <div style={{marginBottom:6}}><span className="badge badge-code">{mod.code}</span></div>
            <h1>{mod.name}</h1>
            <p className="desc" style={{marginTop:8}}>{mod.description}</p>
            {mod.fields.some(f=>f.required)&&<div className="required-box">
              <div className="required-box-label">Required fields</div>
              <div className="required-tags">{mod.fields.filter(f=>f.required).map(f=><span key={f.id} className="required-tag">{f.name}</span>)}</div>
            </div>}
            <div className="divider">
              <h2>Fields</h2>
              <div className="fields-list">{mod.fields.map(f=><FieldRow key={f.id} field={f}/>)}</div>
            </div>
            <h2>Used on</h2>
            <div className="used-on" style={{marginTop:8}}>
              {PAGES.filter(p=>p.moduleIds.includes(selMod)).map(p=>(
                <button key={p.id} className="used-btn" onClick={()=>{setView("pages");setSelPage(p.id);}}>{p.code} {p.name}</button>
              ))}
              {PAGES.filter(p=>p.moduleIds.includes(selMod)).length===0&&<span style={{fontSize:12,color:"#9ca3af"}}>Not linked to any page types in this documentation.</span>}
            </div>
          </>}

        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
